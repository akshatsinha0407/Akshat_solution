<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.1 - Centering Content</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 5.1 – justify-content-center & align-items-center</h1>

  <!-- Horizontal centering -->
  <h5>Horizontal: justify-content-center</h5>
  <div class="row justify-content-center bg-light border mb-4 p-2">
    <div class="col-md-4"><div class="bg-primary text-white p-3 text-center rounded">Centered Col</div></div>
  </div>

  <!-- Vertical centering (needs fixed height) -->
  <h5>Vertical: align-items-center</h5>
  <div class="row align-items-center bg-secondary text-white mb-4 p-2" style="min-height:120px;">
    <div class="col-4"><div class="bg-success p-4 rounded">Tall Box</div></div>
    <div class="col-4"><div class="bg-danger p-2 rounded">Short Box</div></div>
    <div class="col-4"><p class="mb-0">All vertically centered!</p></div>
  </div>

  <!-- Both centered -->
  <h5>Both: justify-content-center + align-items-center</h5>
  <div class="row justify-content-center align-items-center bg-dark text-white" style="min-height:150px;">
    <div class="col-auto">
      <div class="bg-warning text-dark p-3 rounded fw-bold">✅ Fully Centered</div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
