<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.2 - Container, Row, Col</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .demo-col { background: #e9ecef; border: 2px solid #adb5bd; padding: 15px; text-align: center; margin-bottom: 10px; border-radius: 4px; }
  </style>
</head>
<body>
<div class="container mt-5">
  <h1>Exercise 3.2 – .container, .row, .col-*</h1>
  <p class="lead">Demonstrates proper use of Bootstrap grid classes.</p>

  <!-- Fixed container -->
  <h5 class="mt-3">Fixed-width <code>.container</code></h5>
  <div class="container bg-light border p-3 mb-3">
    <div class="row">
      <div class="col-sm-4"><div class="demo-col">col-sm-4</div></div>
      <div class="col-sm-4"><div class="demo-col">col-sm-4</div></div>
      <div class="col-sm-4"><div class="demo-col">col-sm-4</div></div>
    </div>
  </div>

  <!-- Fluid container -->
  <h5>Full-width <code>.container-fluid</code></h5>
  <div class="container-fluid bg-light border p-3 mb-3">
    <div class="row">
      <div class="col-md-3"><div class="demo-col">col-md-3</div></div>
      <div class="col-md-6"><div class="demo-col">col-md-6</div></div>
      <div class="col-md-3"><div class="demo-col">col-md-3</div></div>
    </div>
  </div>

  <!-- Auto columns -->
  <h5>Auto-width <code>.col</code></h5>
  <div class="container bg-light border p-3">
    <div class="row">
      <div class="col"><div class="demo-col">col</div></div>
      <div class="col"><div class="demo-col">col</div></div>
      <div class="col"><div class="demo-col">col</div></div>
      <div class="col"><div class="demo-col">col</div></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
