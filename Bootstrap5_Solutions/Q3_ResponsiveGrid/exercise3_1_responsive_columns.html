<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 - Responsive Grid Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-box { background: #0d6efd; color: white; padding: 20px; text-align: center; border-radius: 6px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-2">Exercise 3.1 – Responsive Columns</h1>
  <p class="text-muted mb-4">Stacks vertically on mobile | 2-per-row on tablet | 3-per-row on desktop</p>
  <div class="row">
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 1</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box" style="background:#198754">Column 2</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box" style="background:#dc3545">Column 3</div></div>
  </div>
  <div class="alert alert-info mt-4">
    <strong>Classes used:</strong> <code>col-12</code> (mobile full width) →
    <code>col-md-6</code> (2 per row on md) → <code>col-lg-4</code> (3 per row on lg)
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
