<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.2 - Button Groups & Toggle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 9.2 – Button Groups & Toggle Buttons</h1>

  <h5>Basic Button Group</h5>
  <div class="btn-group mb-4" role="group">
    <button type="button" class="btn btn-primary">Left</button>
    <button type="button" class="btn btn-primary">Middle</button>
    <button type="button" class="btn btn-primary">Right</button>
  </div>

  <h5>Outlined Button Group</h5>
  <div class="btn-group mb-4" role="group">
    <button type="button" class="btn btn-outline-secondary">Day</button>
    <button type="button" class="btn btn-outline-secondary">Week</button>
    <button type="button" class="btn btn-outline-secondary">Month</button>
  </div>

  <h5>Checkbox Toggle Buttons</h5>
  <div class="btn-group mb-4" role="group">
    <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off">
    <label class="btn btn-outline-primary" for="btncheck1">HTML</label>
    <input type="checkbox" class="btn-check" id="btncheck2" autocomplete="off">
    <label class="btn btn-outline-primary" for="btncheck2">CSS</label>
    <input type="checkbox" class="btn-check" id="btncheck3" autocomplete="off">
    <label class="btn btn-outline-primary" for="btncheck3">JavaScript</label>
  </div>

  <h5>Radio Toggle Buttons</h5>
  <div class="btn-group mb-4" role="group">
    <input type="radio" class="btn-check" name="theme" id="light" autocomplete="off" checked>
    <label class="btn btn-outline-warning" for="light">☀️ Light</label>
    <input type="radio" class="btn-check" name="theme" id="dark" autocomplete="off">
    <label class="btn btn-outline-dark" for="dark">🌙 Dark</label>
    <input type="radio" class="btn-check" name="theme" id="auto" autocomplete="off">
    <label class="btn btn-outline-secondary" for="auto">🖥 Auto</label>
  </div>

  <h5>Vertical Button Group</h5>
  <div class="btn-group-vertical" role="group">
    <button type="button" class="btn btn-success">Top</button>
    <button type="button" class="btn btn-success">Middle</button>
    <button type="button" class="btn btn-success">Bottom</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
