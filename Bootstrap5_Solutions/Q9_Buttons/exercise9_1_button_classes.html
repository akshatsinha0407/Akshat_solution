<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.1 - All Button Classes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 9.1 – All Bootstrap Button Classes</h1>

  <h5>Solid Buttons</h5>
  <div class="d-flex flex-wrap gap-2 mb-4">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-light">Light</button>
    <button class="btn btn-dark">Dark</button>
    <button class="btn btn-link">Link</button>
  </div>

  <h5>Outline Buttons</h5>
  <div class="d-flex flex-wrap gap-2 mb-4">
    <button class="btn btn-outline-primary">Primary</button>
    <button class="btn btn-outline-secondary">Secondary</button>
    <button class="btn btn-outline-success">Success</button>
    <button class="btn btn-outline-danger">Danger</button>
    <button class="btn btn-outline-warning">Warning</button>
    <button class="btn btn-outline-info">Info</button>
    <button class="btn btn-outline-dark">Dark</button>
  </div>

  <h5>Button Sizes</h5>
  <div class="d-flex align-items-center gap-2 mb-4">
    <button class="btn btn-primary btn-lg">Large</button>
    <button class="btn btn-primary">Normal</button>
    <button class="btn btn-primary btn-sm">Small</button>
  </div>

  <h5>Disabled State</h5>
  <div class="d-flex gap-2 mb-4">
    <button class="btn btn-primary" disabled>Disabled Primary</button>
    <button class="btn btn-outline-danger" disabled>Disabled Outline</button>
  </div>

  <h5>Full Width Button</h5>
  <button class="btn btn-success w-100">Block / Full Width Button</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
