<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon-only Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 17.2 – Replace Text Buttons with Icon-only Buttons</h1>

  <h5>Text Buttons (Before)</h5>
  <div class="d-flex flex-wrap gap-2 mb-4 p-3 bg-light rounded">
    <button class="btn btn-primary">Edit</button>
    <button class="btn btn-success">Save</button>
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-info">Share</button>
    <button class="btn btn-warning">Download</button>
    <button class="btn btn-secondary">Settings</button>
    <button class="btn btn-dark">Search</button>
  </div>

  <h5>Icon-only Buttons (After)</h5>
  <div class="d-flex flex-wrap gap-2 mb-4 p-3 bg-light rounded">
    <button class="btn btn-primary" title="Edit"><i class="bi bi-pencil"></i></button>
    <button class="btn btn-success" title="Save"><i class="bi bi-floppy"></i></button>
    <button class="btn btn-danger" title="Delete"><i class="bi bi-trash"></i></button>
    <button class="btn btn-info" title="Share"><i class="bi bi-share"></i></button>
    <button class="btn btn-warning" title="Download"><i class="bi bi-download"></i></button>
    <button class="btn btn-secondary" title="Settings"><i class="bi bi-gear"></i></button>
    <button class="btn btn-dark" title="Search"><i class="bi bi-search"></i></button>
  </div>

  <h5>Icon + Text Buttons (Hybrid)</h5>
  <div class="d-flex flex-wrap gap-2 p-3 bg-light rounded">
    <button class="btn btn-primary"><i class="bi bi-pencil me-1"></i>Edit</button>
    <button class="btn btn-success"><i class="bi bi-floppy me-1"></i>Save</button>
    <button class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
    <button class="btn btn-outline-primary"><i class="bi bi-plus-circle me-1"></i>Add New</button>
    <button class="btn btn-outline-dark"><i class="bi bi-arrow-left me-1"></i>Back</button>
  </div>

  <h5 class="mt-4">Icon Button Sizes</h5>
  <div class="d-flex align-items-center gap-2 p-3 bg-light rounded">
    <button class="btn btn-primary btn-lg"><i class="bi bi-heart-fill fs-4"></i></button>
    <button class="btn btn-danger"><i class="bi bi-heart-fill"></i></button>
    <button class="btn btn-warning btn-sm"><i class="bi bi-heart-fill"></i></button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
