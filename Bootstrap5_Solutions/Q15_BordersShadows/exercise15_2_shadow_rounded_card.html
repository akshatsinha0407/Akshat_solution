<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.2 - Shadow and Rounded Cards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <h1 class="mb-5">Exercise 15.2 – shadow, shadow-lg, rounded-pill in Cards</h1>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card shadow p-4 text-center">
        <h5>shadow</h5>
        <p class="text-muted">Regular shadow depth</p>
        <button class="btn btn-outline-primary rounded-pill">rounded-pill button</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-lg rounded-4 p-4 text-center">
        <h5>shadow-lg + rounded-4</h5>
        <p class="text-muted">Large shadow with soft rounded corners</p>
        <button class="btn btn-primary rounded-pill">Buy Now</button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm rounded-3 p-4 text-center">
        <h5>shadow-sm + rounded-3</h5>
        <p class="text-muted">Subtle shadow, medium corners</p>
        <button class="btn btn-success rounded-pill">Learn More</button>
      </div>
    </div>
    <div class="col-12">
      <div class="card shadow-lg rounded-pill p-4 text-center">
        <h5 class="mb-0">Card with <code>rounded-pill</code> shape</h5>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
