<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Border Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 15.1 – Border Utilities on Images</h1>
  <div class="row g-4 text-center">
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img1/150/150" class="border" width="150" height="150">
      <p class="mt-2"><code>border</code></p>
    </div>
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img2/150/150" class="border border-primary border-3" width="150" height="150">
      <p class="mt-2"><code>border-primary border-3</code></p>
    </div>
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img3/150/150" class="border border-success border-2 rounded" width="150" height="150">
      <p class="mt-2"><code>border-success rounded</code></p>
    </div>
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img4/150/150" class="border border-danger border-3 rounded-circle" width="150" height="150">
      <p class="mt-2"><code>border-danger rounded-circle</code></p>
    </div>
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img5/150/150" class="rounded-pill border border-warning border-2" width="150" height="150">
      <p class="mt-2"><code>rounded-pill</code></p>
    </div>
    <div class="col-md-3">
      <img src="https://picsum.photos/seed/img6/150/150" class="border-0 rounded-4" width="150" height="150">
      <p class="mt-2"><code>border-0 rounded-4</code></p>
    </div>
    <div class="col-md-3">
      <div class="border border-top-0 border-3 border-info p-3">
        <p class="mb-0">border-top-0<br>border-3<br>border-info</p>
      </div>
    </div>
    <div class="col-md-3">
      <div class="border border-end-0 border-start-0 border-warning border-2 p-3">
        <p class="mb-0">Only top & bottom borders</p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
