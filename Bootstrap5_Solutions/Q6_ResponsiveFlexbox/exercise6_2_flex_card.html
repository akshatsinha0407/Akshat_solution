<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 6.2 - Flex Card Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 6.2 – justify-content-between & align-items-center in Card</h1>
  <div class="card shadow">
    <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white">
      <h5 class="mb-0">📋 Task Manager</h5>
      <button class="btn btn-sm btn-light">+ Add Task</button>
    </div>
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center border-bottom py-2">
        <span>Design homepage mockup</span>
        <span class="badge bg-warning text-dark">In Progress</span>
      </div>
      <div class="d-flex justify-content-between align-items-center border-bottom py-2">
        <span>Set up Bootstrap project</span>
        <span class="badge bg-success">Done</span>
      </div>
      <div class="d-flex justify-content-between align-items-center py-2">
        <span>Write unit tests</span>
        <span class="badge bg-secondary">Todo</span>
      </div>
    </div>
    <div class="card-footer d-flex justify-content-between align-items-center">
      <small class="text-muted">3 tasks total</small>
      <button class="btn btn-sm btn-outline-primary">View All</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
