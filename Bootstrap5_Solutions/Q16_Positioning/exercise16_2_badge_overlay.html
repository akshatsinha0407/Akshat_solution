<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 16.2 - Badge Overlay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 16.2 – position-relative & position-absolute (Badge Overlay)</h1>

  <div class="row g-4">
    <!-- Product Card with badge overlay -->
    <div class="col-md-4">
      <div class="card shadow">
        <div class="position-relative">
          <img src="https://picsum.photos/seed/product1/400/200" class="card-img-top w-100" alt="Product">
          <!-- Absolute badge over image -->
          <span class="position-absolute top-0 start-0 bg-danger text-white m-2 px-2 py-1 rounded fw-bold">SALE</span>
          <span class="position-absolute top-0 end-0 bg-success text-white m-2 px-2 py-1 rounded fw-bold">NEW</span>
        </div>
        <div class="card-body">
          <h5>Product Name</h5>
          <p class="text-muted">₹1,299 <del class="text-danger">₹1,999</del></p>
          <button class="btn btn-primary w-100">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- Notification Bell with badge -->
    <div class="col-md-4 text-center">
      <h5 class="mb-3">Notification Icon</h5>
      <div class="position-relative d-inline-block">
        <button class="btn btn-light btn-lg border shadow-sm">
          🔔
        </button>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          5
        </span>
      </div>
      <p class="text-muted mt-2">Bell icon with notification badge</p>
    </div>

    <!-- Avatar with online status -->
    <div class="col-md-4 text-center">
      <h5 class="mb-3">Online Status</h5>
      <div class="position-relative d-inline-block">
        <img src="https://picsum.photos/seed/avatar1/80/80" class="rounded-circle border border-2" width="80" height="80">
        <span class="position-absolute bottom-0 end-0 bg-success rounded-circle border border-white" style="width:18px;height:18px;"></span>
      </div>
      <p class="text-muted mt-2">Avatar with online dot overlay</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
