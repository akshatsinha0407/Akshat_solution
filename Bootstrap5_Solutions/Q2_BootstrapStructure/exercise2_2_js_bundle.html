<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2.2 - Bootstrap JS Bundle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1>Exercise 2.2 – Bootstrap JS Bundle</h1>
  <p class="lead">
    <code>bootstrap.bundle.min.js</code> includes Bootstrap JS <strong>and</strong> Popper.js.
    It powers dropdowns, tooltips, modals, and more.
  </p>

  <!-- Dropdown powered by JS bundle -->
  <div class="dropdown mb-3">
    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
      Dropdown (needs JS)
    </button>
    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="#">Action 1</a></li>
      <li><a class="dropdown-item" href="#">Action 2</a></li>
    </ul>
  </div>

  <!-- Tooltip powered by JS bundle -->
  <button type="button" class="btn btn-info" data-bs-toggle="tooltip" title="Tooltip works via JS bundle!">
    Hover for Tooltip
  </button>

  <div class="alert alert-success mt-4">
    <strong>Note:</strong> The <code>&lt;script&gt;</code> tag for <code>bootstrap.bundle.min.js</code>
    is placed just before <code>&lt;/body&gt;</code>.
  </div>
</div>
<!-- bootstrap.bundle.min.js includes Popper.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Enable all tooltips on the page
  const tooltipEls = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tooltipEls.forEach(el => new bootstrap.Tooltip(el));
</script>
</body>
</html>
