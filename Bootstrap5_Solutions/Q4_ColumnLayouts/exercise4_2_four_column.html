<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.2 - Four Column Equal Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">Exercise 4.2 – Four Equal Columns (col-sm-3)</h1>
  <div class="row text-center">
    <div class="col-sm-3">
      <div class="card bg-primary text-white p-3">
        <h5>Column 1</h5>
        <p>col-sm-3</p>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card bg-success text-white p-3">
        <h5>Column 2</h5>
        <p>col-sm-3</p>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card bg-warning text-dark p-3">
        <h5>Column 3</h5>
        <p>col-sm-3</p>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="card bg-danger text-white p-3">
        <h5>Column 4</h5>
        <p>col-sm-3</p>
      </div>
    </div>
  </div>
  <p class="text-muted mt-3">Each column is <code>col-sm-3</code> = 3/12 = 25% width on small+ screens.</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
