<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.2 - Responsive Sidebar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">MyApp</span>
  <button class="btn btn-outline-light d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mobileSidebar">☰ Menu</button>
</nav>
<div class="container-fluid mt-3">
  <div class="row">
    <!-- Sidebar: d-none d-md-block = hidden on mobile, block on tablet+ -->
    <div class="col-md-3 d-none d-md-block">
      <div class="bg-dark text-white rounded p-3" style="min-height:80vh">
        <h5 class="mb-3">📂 Navigation</h5>
        <ul class="list-unstyled">
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">🏠 Dashboard</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">👥 Users</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">📊 Analytics</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">⚙️ Settings</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">🚪 Logout</a></li>
        </ul>
      </div>
    </div>
    <!-- Mobile collapsible sidebar -->
    <div class="col-12 d-md-none collapse" id="mobileSidebar">
      <div class="bg-secondary text-white rounded p-3 mb-3">
        <ul class="list-unstyled mb-0">
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">🏠 Dashboard</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">👥 Users</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">📊 Analytics</a></li>
          <li class="mb-2"><a href="#" class="text-white text-decoration-none">⚙️ Settings</a></li>
        </ul>
      </div>
    </div>
    <!-- Main content -->
    <div class="col-md-9">
      <div class="p-4 bg-light rounded">
        <h2>Main Content Area</h2>
        <p class="text-muted">Sidebar is visible on tablets (md+). On mobile, use the ☰ Menu button in the navbar.</p>
        <div class="row g-3 mt-2">
          <div class="col-sm-6 col-xl-3"><div class="card p-3 text-center bg-primary text-white">Metric 1</div></div>
          <div class="col-sm-6 col-xl-3"><div class="card p-3 text-center bg-success text-white">Metric 2</div></div>
          <div class="col-sm-6 col-xl-3"><div class="card p-3 text-center bg-warning text-dark">Metric 3</div></div>
          <div class="col-sm-6 col-xl-3"><div class="card p-3 text-center bg-danger text-white">Metric 4</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
